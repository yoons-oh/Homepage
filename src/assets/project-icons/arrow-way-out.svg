<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Arrow Way Out</title>
  <desc id="desc">Three glossy arrow tiles showing right, up, and left directions.</desc>
  <defs>
    <linearGradient id="blueTile" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#61b5ff"/>
      <stop offset="0.5" stop-color="#2372f4"/>
      <stop offset="1" stop-color="#0642c9"/>
    </linearGradient>
    <linearGradient id="greenTile" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6af1c0"/>
      <stop offset="0.48" stop-color="#1bb995"/>
      <stop offset="1" stop-color="#087a6a"/>
    </linearGradient>
    <linearGradient id="purpleTile" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d99bff"/>
      <stop offset="0.48" stop-color="#8d55ee"/>
      <stop offset="1" stop-color="#5a24cb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.86"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#18213d" flood-opacity="0.22"/>
    </filter>
    <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#0d245f" flood-opacity="0.36"/>
    </filter>
    <symbol id="arrowRight" viewBox="0 0 120 88">
      <path d="M14 44h75" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="18"/>
      <path d="M67 16l30 28-30 28" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="18"/>
    </symbol>
  </defs>
  <rect width="720" height="260" rx="34" fill="#f7fbff"/>
  <g filter="url(#softShadow)">
    <g transform="translate(24 28)">
      <rect width="196" height="196" rx="20" fill="url(#blueTile)"/>
      <rect x="10" y="10" width="176" height="176" rx="14" fill="none" stroke="#fff" stroke-opacity="0.34" stroke-width="8"/>
      <path d="M22 28c26-15 116-19 150 2" fill="none" stroke="url(#shine)" stroke-linecap="round" stroke-width="22"/>
      <use href="#arrowRight" x="38" y="54" width="120" height="88" filter="url(#arrowShadow)"/>
      <rect x="7" y="7" width="182" height="182" rx="16" fill="none" stroke="#003fc8" stroke-opacity="0.36" stroke-width="3"/>
    </g>
    <g transform="translate(262 28)">
      <rect width="196" height="196" rx="20" fill="url(#greenTile)"/>
      <rect x="10" y="10" width="176" height="176" rx="14" fill="none" stroke="#fff" stroke-opacity="0.34" stroke-width="8"/>
      <path d="M22 28c26-15 116-19 150 2" fill="none" stroke="url(#shine)" stroke-linecap="round" stroke-width="22"/>
      <g transform="translate(54 38) rotate(-90 60 44)" filter="url(#arrowShadow)">
        <use href="#arrowRight" width="120" height="88"/>
      </g>
      <circle cx="46" cy="52" r="5" fill="#fff" opacity="0.22"/>
      <circle cx="132" cy="126" r="4" fill="#fff" opacity="0.2"/>
      <circle cx="108" cy="74" r="3" fill="#fff" opacity="0.26"/>
      <rect x="7" y="7" width="182" height="182" rx="16" fill="none" stroke="#006354" stroke-opacity="0.36" stroke-width="3"/>
    </g>
    <g transform="translate(500 28)">
      <rect width="196" height="196" rx="20" fill="url(#purpleTile)"/>
      <rect x="10" y="10" width="176" height="176" rx="14" fill="none" stroke="#fff" stroke-opacity="0.34" stroke-width="8"/>
      <path d="M22 28c26-15 116-19 150 2" fill="none" stroke="url(#shine)" stroke-linecap="round" stroke-width="22"/>
      <g transform="translate(158 142) rotate(180 60 44)" filter="url(#arrowShadow)">
        <use href="#arrowRight" width="120" height="88"/>
      </g>
      <rect x="7" y="7" width="182" height="182" rx="16" fill="none" stroke="#4c18aa" stroke-opacity="0.36" stroke-width="3"/>
    </g>
  </g>
</svg>
